{% load static %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h6 class="fw-bold mb-0">বিদেশি ভাষায় দক্ষতা</h6>
  <a href="{% url 'mp:language_create' mp.pk %}" class="btn btn-primary btn-sm">
    <i class="bi bi-plus-lg me-1"></i>যোগ করুন
  </a>
</div>

{% if language_skills %}
<div class="table-responsive">
  <table class="mp-table">
    <thead>
      <tr>
        <th style="width:50px;">ক্রম</th>
        <th>ভাষা</th>
        <th>দক্ষতার মাত্রা</th>
        <th style="width:100px;">কার্যক্রম</th>
      </tr>
    </thead>
    <tbody>
      {% for skill in language_skills %}
      <tr>
        <td>{{ skill.ordering }}</td>
        <td>{{ skill.language }}</td>
        <td>{{ skill.proficiency|default:"—" }}</td>
        <td>
          <a href="{% url 'mp:language_update' mp.pk skill.pk %}"
             class="btn btn-outline-secondary btn-xs"><i class="bi bi-pencil"></i></a>
          <form method="post" action="{% url 'mp:language_delete' mp.pk skill.pk %}"
                class="d-inline" onsubmit="return confirm('মুছে ফেলবেন?')">
            {% csrf_token %}
            <button class="btn btn-outline-danger btn-xs"><i class="bi bi-trash"></i></button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<p class="text-muted text-center py-4">কোনো ভাষার তথ্য নেই।</p>
{% endif %}
