upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # GO uploads are validated at <=10 MB; allow some headroom.
    client_max_body_size 25M;

    # Collected static files (WhiteNoise-built manifest + hashed assets).
    location /static/ {
        alias /app/static_collected/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # User-uploaded media (GO PDFs/images, MP photos).
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
